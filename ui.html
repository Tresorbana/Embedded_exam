<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Monitor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      h1 {
        font-size: 1.4rem;
        font-weight: 500;
        color: #94a3b8;
        margin-bottom: 2rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: 480px;
        margin-bottom: 1.5rem;
      }
      .label {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.4rem;
      }
      .candidate {
        font-size: 1.2rem;
        font-weight: 500;
        color: #e2e8f0;
        margin-bottom: 1.5rem;
      }
      .temp-display {
        display: flex;
        align-items: flex-end;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .temp-value {
        font-size: 4rem;
        font-weight: 700;
        color: #38bdf8;
        line-height: 1;
        transition: color 0.5s;
      }
      .temp-value.hot {
        color: #f97316;
      }
      .temp-value.warm {
        color: #facc15;
      }
      .temp-value.cool {
        color: #38bdf8;
      }
      .temp-unit {
        font-size: 1.5rem;
        color: #64748b;
        margin-bottom: 0.6rem;
      }
      .bar-track {
        background: #0f172a;
        border-radius: 999px;
        height: 10px;
        width: 100%;
        margin-bottom: 1.5rem;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: #38bdf8;
        width: 0%;
        transition:
          width 1s ease,
          background 0.5s;
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.8rem;
      }
      .meta-item .label {
        margin-bottom: 0.2rem;
      }
      .meta-item span {
        font-size: 0.85rem;
        color: #cbd5e1;
      }
      .status-dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #ef4444;
        margin-right: 6px;
        animation: pulse 2s infinite;
      }
      .status-dot.connected {
        background: #22c55e;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .history-card {
        padding: 1.5rem 2rem;
      }
      .history-card h2 {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 1rem;
      }
      .history-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
      .history-list li {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
        padding: 0.4rem 0;
        border-bottom: 1px solid #0f172a;
        color: #94a3b8;
      }
      .history-list li:last-child {
        border-bottom: none;
      }
      .history-list li span:last-child {
        color: #38bdf8;
        font-weight: 500;
      }
      #no-data {
        text-align: center;
        color: #475569;
        font-size: 0.9rem;
        padding: 1rem 0;
      }
      .topic-badge {
        display: inline-block;
        background: #0f172a;
        border: 1px solid #334155;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 0.75rem;
        color: #38bdf8;
        font-family: monospace;
      }
    </style>
  </head>
  <body>
    <h1>Arduino Temperature Monitor</h1>

    <div class="card">
      <div class="label">Candidate</div>
      <div class="candidate">Bana Emmy Tresor</div>

      <div class="label">Live temperature</div>
      <div class="temp-display">
        <div class="temp-value cool" id="temp-value">--</div>
        <div class="temp-unit">°C</div>
      </div>

      <div class="bar-track">
        <div class="bar-fill" id="bar-fill"></div>
      </div>

      <div class="meta">
        <div class="meta-item">
          <div class="label">Status</div>
          <span
            ><span class="status-dot" id="status-dot"></span
            ><span id="status-text">Connecting...</span></span
          >
        </div>
        <div class="meta-item">
          <div class="label">Last update</div>
          <span id="last-time">--:--:--</span>
        </div>
        <div class="meta-item">
          <div class="label">MQTT topic</div>
          <span class="topic-badge">sensor_bana_emmy_tresor</span>
        </div>
        <div class="meta-item">
          <div class="label">Broker</div>
          <span>broker.benax.rw:9001</span>
        </div>
      </div>
    </div>

    <div class="card history-card">
      <h2>Recent readings</h2>
      <div id="no-data">Waiting for data...</div>
      <ul class="history-list" id="history-list"></ul>
    </div>

    <script src="paho-mqtt.js"></script>
    <script>
      const BROKER = "157.173.101.159";
      const WS_PORT = 9001;
      const TOPIC = "sensor_bana_emmy_tresor";

      const tempEl = document.getElementById("temp-value");
      const barEl = document.getElementById("bar-fill");
      const timeEl = document.getElementById("last-time");
      const histEl = document.getElementById("history-list");
      const noData = document.getElementById("no-data");
      const dotEl = document.getElementById("status-dot");
      const statusEl = document.getElementById("status-text");
      const history = [];

      function setStatus(connected, text) {
        dotEl.className = "status-dot" + (connected ? " connected" : "");
        statusEl.textContent = text;
      }

      function updateTemp(temp) {
        const now = new Date().toLocaleTimeString();
        tempEl.textContent = temp.toFixed(1);
        timeEl.textContent = now;

        tempEl.className = "temp-value";
        if (temp >= 35) tempEl.classList.add("hot");
        else if (temp >= 28) tempEl.classList.add("warm");
        else tempEl.classList.add("cool");

        const pct = Math.min((temp / 50) * 100, 100);
        barEl.style.width = pct + "%";
        barEl.style.background =
          temp >= 35 ? "#f97316" : temp >= 28 ? "#facc15" : "#38bdf8";

        history.unshift({ time: now, temp: temp.toFixed(2) });
        if (history.length > 10) history.pop();

        noData.style.display = "none";
        histEl.innerHTML = history
          .map(
            (r) => `<li><span>${r.time}</span><span>${r.temp} °C</span></li>`,
          )
          .join("");
      }

      const client = new Paho.Client(
        BROKER,
        WS_PORT,
        "ui-" + Math.random().toString(16).slice(2),
      );

      client.onConnectionLost = () => {
        setStatus(false, "Disconnected");
        setTimeout(connect, 3000);
      };

      client.onMessageArrived = (msg) => {
        const val = parseFloat(msg.payloadString);
        if (!isNaN(val)) updateTemp(val);
      };

      function connect() {
        setStatus(false, "Connecting...");
        client.connect({
          onSuccess: () => {
            setStatus(true, "Connected");
            client.subscribe(TOPIC);
          },
          onFailure: () => {
            setStatus(false, "Cannot reach broker");
            setTimeout(connect, 5000);
          },
        });
      }

      connect();
    </script>
  </body>
</html>
